<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dragonhack Jебачи</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <a href="menu.html" class="back-link">← Menu</a>
  <h1>Dragonhack <span>Jебачи</span></h1>
  <span class="version">v0.1</span>
  <span class="predavanje-title" id="predavanjeTitle"></span>
</header>

<div class="main">

  <div class="info-card">

    <!-- Left: engagement score -->
    <div class="info-half info-engagement">
      <span class="ocr-label">Engagement score</span>
      <div class="engagement-body">
        <div class="engagement-score" id="engagementScore">—</div>
      </div>
      <div class="volume-meter" id="volumeMeter">
        <div class="vm-bar"></div>
        <div class="vm-bar"></div>
        <div class="vm-bar"></div>
        <div class="vm-bar"></div>
        <div class="vm-bar"></div>
        <div class="vm-bar"></div>
        <div class="vm-bar"></div>
        <div class="vm-bar"></div>
        <div class="vm-bar"></div>
        <div class="vm-bar"></div>
        <div class="vm-bar"></div>
        <div class="vm-bar"></div>
        <div class="vm-bar"></div>
        <div class="vm-bar"></div>
        <div class="vm-bar"></div>
        <div class="vm-bar"></div>
        <div class="vm-bar"></div>
        <div class="vm-bar"></div>
        <div class="vm-bar"></div>
        <div class="vm-bar"></div>
      </div>
    </div>

    <div class="info-divider"></div>

    <!-- Right: device controls -->
    <div class="info-half info-device">
      <span class="ocr-label">Device</span>
      <div class="info-device-body">
        <div class="info-left">
          <div class="status-dot" id="statusDot"></div>
          <div>
            <div class="camera-name" id="cameraName">No device selected</div>
            <div class="camera-mxid" id="cameraMxid">—</div>
          </div>
        </div>
        <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
          <select id="deviceSelect">
            <option value="">— select device —</option>
          </select>
          <button class="refresh-btn" onclick="fetchDevices()">↺ Scan</button>
          <button class="refresh-btn connect-btn" onclick="connectDevice()">Connect</button>
        </div>
      </div>
    </div>

  </div>

  <!-- Two column layout -->
  <div class="columns">

    <!-- Left: video + controls + OCR -->
    <div class="col-left">
      <div class="video-wrap" id="videoWrap">
        <div class="video-placeholder" id="placeholder">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M15 10l4.553-2.069A1 1 0 0121 8.87v6.26a1 1 0 01-1.447.9L15 14M3 8a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/>
          </svg>
          <p>Stream not started</p>
        </div>
        <img id="videoFeed" src="" alt="Camera feed" style="display:none" />
        <video id="videoPlayback" style="display:none; width:100%; height:100%; object-fit:cover;" controls></video>
        <div class="live-badge" id="liveBadge">● live</div>
      </div>

      <div class="controls">
        <button class="btn btn-primary" id="startBtn" onclick="startStream()" disabled>Start stream</button>
        <button class="btn btn-secondary" id="stopBtn" onclick="stopStream()">Stop</button>
      </div>

      <div class="ocr-card">
        <div class="ocr-header">
          <span class="ocr-label">OCR — detected text</span>
          <div class="ocr-dot" id="ocrDot"></div>
        </div>
        <div class="ocr-text" id="ocrText">
          <span class="ocr-empty">Waiting for text...</span>
        </div>
      </div>
    </div>

    <!-- Right: transcript + summary -->
    <div class="col-right">
      <div class="transcript-card">
        <div class="ocr-header">
          <span class="ocr-label">Transcript — speech</span>
          <div class="ocr-dot" id="transcriptDot"></div>
        </div>
        <div class="transcript-text" id="transcriptText">
	</div>
      </div>

      <div class="summary-card" id="summaryCard" style="display:none;">
        <div class="ocr-header">
          <span class="ocr-label">Summary</span>
          <div class="summary-badge">AI</div>
        </div>
        <div class="summary-text" id="summaryText">
          <span class="ocr-empty">Generating summary...</span>
        </div>
      </div>
    </div>

  </div>

</div>

<script type="module" src="app.js"></script>
</body>
</html>
