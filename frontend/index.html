<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dragonhack Jебачи</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111;
      --border: #222;
      --accent: #00ff86;
      --accent-dim: rgba(0, 255, 135, 0.1);
      --text: #e8e8e8;
      --muted: #555;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    header {
      width: 100%;
      max-width: 860px;
      display: flex;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 32px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 20px;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #fff;
    }

    h1 span { color: var(--accent); }

    .version {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .main {
      width: 100%;
      max-width: 860px;
      display: grid;
      gap: 16px;
    }

    /* Camera info card */
    .info-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .info-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .status-dot.connected { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
    .status-dot.error { background: #ff4444; }

    .camera-name {
      font-size: 13px;
      color: var(--text);
    }

    .camera-mxid {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .refresh-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      padding: 6px 14px;
      border-radius: 4px;
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all 0.2s;
    }

    .refresh-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Video container */
    .video-wrap {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      aspect-ratio: 4/3;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .video-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .video-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      color: var(--muted);
    }

    .video-placeholder svg { opacity: 0.3; }

    .video-placeholder p {
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .live-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(0,0,0,0.7);
      border: 1px solid var(--accent);
      color: var(--accent);
      font-size: 10px;
      letter-spacing: 2px;
      padding: 3px 8px;
      border-radius: 3px;
      text-transform: uppercase;
      display: none;
    }

    .live-badge.visible { display: block; }

    /* Controls */
    .controls {
      display: flex;
      gap: 10px;
    }

    .btn {
      flex: 1;
      padding: 12px;
      border-radius: 6px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      border: 1px solid var(--border);
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
      font-weight: 500;
    }

    .btn-primary:hover { background: #00e87a; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-secondary {
      background: none;
      color: var(--muted);
    }

    .btn-secondary:hover { border-color: #555; color: var(--text); }
    .btn-secondary:disabled { opacity: 0.3; cursor: not-allowed; }
  </style>
</head>
<body>

<header>
  <h1>Dragonhack <span>Jебачи</span></h1>
  <span class="version">v0.1</span>
</header>

<div class="main">

  <!-- Replace the info-card div with this -->
  <div class="info-card">
    <div class="info-left">
      <div class="status-dot" id="statusDot"></div>
      <div>
        <div class="camera-name" id="cameraName">No device selected</div>
        <div class="camera-mxid" id="cameraMxid">—</div>
      </div>
    </div>
    <div style="display:flex; gap:8px; align-items:center">
      <select id="deviceSelect" style="background:#1a1a1a; color:#888; border:1px solid #222; font-family:'DM Mono',monospace; font-size:12px; padding:6px 10px; border-radius:4px;">
        <option value="">— select device —</option>
      </select>
      <button class="refresh-btn" onclick="fetchDevices()">↺ Scan</button>
      <button class="refresh-btn" onclick="connectDevice()" style="border-color:#00ff87;color:#00ff87">Connect</button>
    </div>
  </div>

  <!-- Video feed -->
  <div class="video-wrap" id="videoWrap">
    <div class="video-placeholder" id="placeholder">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M15 10l4.553-2.069A1 1 0 0121 8.87v6.26a1 1 0 01-1.447.9L15 14M3 8a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/>
      </svg>
      <p>Stream not started</p>
    </div>
    <img id="videoFeed" src="" alt="Camera feed" style="display:none" />
    <div class="live-badge" id="liveBadge">● live</div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn btn-primary" id="startBtn" onclick="startStream()" disabled>Start stream</button>
    <button class="btn btn-secondary" id="stopBtn" onclick="stopStream()" disabled>Stop</button>
  </div>

</div>

<script>
  const BACKEND = "http://localhost:8000";
  let streaming = false;

  async function fetchDevices() {
    const select = document.getElementById("deviceSelect");
    select.innerHTML = '<option value="">scanning...</option>';
    try {
      const res = await fetch(`${BACKEND}/devices`);
      const devices = await res.json();
      select.innerHTML = '<option value="">— select device —</option>';
      devices.forEach(d => {
        const opt = document.createElement("option");
        opt.value = d.name;  // name is the IP for PoE devices
        opt.textContent = `${d.name} (${d.mxid})`;
        select.appendChild(opt);
      });
      if (devices.length === 0) {
        select.innerHTML = '<option value="">no devices found</option>';
      }
    } catch {
      select.innerHTML = '<option value="">scan failed</option>';
    }
  }

  async function connectDevice() {
    const ip = document.getElementById("deviceSelect").value;
    if (!ip) return;
    await fetch(`${BACKEND}/connect`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ ip })
    });
    document.getElementById("statusDot").className = "status-dot connected";
    document.getElementById("cameraName").textContent = `OAK Camera (${ip})`;
    document.getElementById("cameraMxid").textContent = ip;
    document.getElementById("startBtn").disabled = false;
  }

  function startStream() {
    streaming = true;
    const img = document.getElementById("videoFeed");
    img.src = `${BACKEND}/video-feed`;
    img.style.display = "block";
    document.getElementById("placeholder").style.display = "none";
    document.getElementById("liveBadge").classList.add("visible");
    document.getElementById("startBtn").disabled = true;
    document.getElementById("stopBtn").disabled = false;
  }

  function stopStream() {
      streaming = false;
      const img = document.getElementById("videoFeed");
      img.src = "";
      img.style.display = "none";
      document.getElementById("placeholder").style.display = "flex";
      document.getElementById("liveBadge").classList.remove("visible");
      document.getElementById("startBtn").disabled = false;
      document.getElementById("stopBtn").disabled = true;
  }

  // Scan on load
  fetchDevices();
</script>

</body>
</html>
