<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rostra — Menu</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1><span>Rostra</span></h1>
      <span class="version">v1.0</span>
    </header>

    <div class="main">
      <div class="menu-card">
        <div class="menu-header">
          <span class="ocr-label">Predavanja</span>
        </div>

        <form class="menu-add" id="addForm">
          <input
            type="text"
            id="predavanjeName"
            class="menu-input"
            placeholder="Ime predavanja..."
            autocomplete="off"
            required
          />
          <button type="submit" class="btn btn-primary menu-add-btn">
            + Add
          </button>
        </form>

        <ul class="menu-list" id="predavanjaList">
          <!-- HARDCODED PREDAVANJE -->
          <li class="menu-item" data-static="true">
            <a class="menu-item-link" href="video.html">Family Guy Interview</a>
          </li>
        </ul>

        <div class="menu-empty" id="menuEmpty">
          No predavanja yet. Add one above.
        </div>
      </div>
    </div>
    <script src="menu.js"></script>
  </body>
</html>
